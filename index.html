<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mark Vegas</title>
    <link rel="canonical" href="https://markvegas.space/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ====== HERO / PROFILE ====== -->
    <section class="hero">
      <div class="container">
        <div class="hero-inner">
          <div class="hero-text">
            <h1 class="hero-name" id="hero-name"></h1>
            <p class="hero-bio" id="hero-bio"></p>
            <div class="hero-contact" id="hero-contact"></div>
          </div>
          <div class="hero-photo-wrap" id="hero-photo-wrap">
            <div
              class="hero-photo-placeholder"
              id="hero-photo-placeholder"
            ></div>
          </div>
        </div>
      </div>
    </section>

    <div class="container">
      <div class="section-divider"></div>
    </div>

    <!-- ====== PORTFOLIO GRID ====== -->
    <section class="portfolio-section">
      <div class="container">
        <p class="portfolio-heading">Portfolio</p>
        <div class="bento-grid" id="bento-grid">
          <div class="loading-state" id="loading-state">Loading...</div>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
