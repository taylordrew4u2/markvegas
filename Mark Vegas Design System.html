  <title>Mark Vegas — Design System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #0a0a0a; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\" data-theme=\"noir\"><head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n  <title>Mark Vegas — Design System<\u002Ftitle>\n  <style>/* =========================================================================\n   Mark Vegas — Design System: Colors & Type Tokens\n   =========================================================================\n   Aesthetic: cinematic, editorial, premium. Near-black canvas, warm paper\n   off-white, zero chrome. Serif display for names & titles; clean sans\n   for body + UI; mono for metadata (year, client, role, tools).\n\n   COLOR SCHEMES\n   -------------\n   Swap the entire palette by setting `data-theme` on <html> or <body>:\n     <html data-theme=\"noir\">      — default: near-black canvas, amber accent\n     <html data-theme=\"paper\">     — warm off-white admin / inverted\n     <html data-theme=\"midnight\">  — deep blue-black, cool accent\n     <html data-theme=\"bone\">      — warm paper, ink text (editorial light)\n     <html data-theme=\"ember\">     — charcoal w/ deep red accent\n     <html data-theme=\"mono\">      — pure grayscale, no warm tint\n\n   Every scheme only overrides the SEMANTIC tokens (--bg, --fg, --accent …).\n   The TYPE scale, spacing, radii, and motion stay constant across themes.\n   ========================================================================= */\n\n/* latin-ext */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"29bb1577-520c-4939-8ca6-63d34cc8adf3\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Instrument Serif';\n  font-style: italic;\n  font-weight: 400;\n  font-display: swap;\n  src: url \n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"a97d2c2f-5086-4f40-b29d-28ef87743a3c\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"f2711aff-4ba0-4036-a017-23c34586a1ae\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"7d1bbead-9e16-481e-953c-1ea70c70d9d3\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Satoshi — brand sans, self-hosted from uploaded OTFs (full family).\n   Weights: Light 300 · Regular 400 · Medium 500 · Bold 700 · Black 900\n   plus matching italics. Used for body, UI, labels, buttons.\n   For the editorial display face, see --font-display (Instrument Serif). */\n@font-face { font-family: 'Satoshi'; src: url(\"b200ab5d-493f-4052-b2e5-5a9380887424\") format('opentype');        font-weight: 300; font-style: normal; font-display: swap; }\n@font-face { font-family: 'Satoshi'; src: url(\"729dbf71-63fc-4e69-a2a4-6f00357cdb5d\") format('opentype');  font-weight: 300; font-style: italic; font-display: swap; }\n@font-face { font-family: 'Satoshi'; src: url(\"530428d1-26a7-4bd4-9357-6f7d323d6ffe\") format('opentype');      font-weight: 400; font-style: normal; font-display: swap; }\n@font-face { font-family: 'Satoshi'; src: url(\"233937d5-a93b-4993-8ed2-997bec52749b\") format('opentype');       font-weight: 400; font-style: italic; font-display: swap; }\n@font-face { font-family: 'Satoshi'; src: url(\"83bdd827-21d1-4cfc-ae18-12a42da91756\") format('opentype');       font-weight: 500; font-style: normal; font-display: swap; }\n@font-face { font-family: 'Satoshi'; src: url(\"889a0e50-54d1-476d-bbe6-ef5b7a88209f\") format('opentype'); font-weight: 500; font-style: italic; font-display: swap; }\n@font-face { font-family: 'Satoshi'; src: url(\"dce6a360-12cc-497a-8b33-6a75a14c38a2\") format('opentype');         font-weight: 700; font-style: normal; font-display: swap; }\n@font-face { font-family: 'Satoshi'; src: url(\"d3ccd3f7-bdd3-4785-a34b-86da3e8a0e7f\") format('opentype');   font-weight: 700; font-style: italic; font-display: swap; }\n@font-face { font-family: 'Satoshi'; src: url(\"79f2b9fd-e0d8-49b2-941b-dc34b05b486b\") format('opentype');        font-weight: 900; font-style: normal; font-display: swap; }\n@font-face { font-family: 'Satoshi'; src: url(\"235fc09b-bc72-4c15-8aa3-3f4a84f67c45\") format('opentype');  font-weight: 900; font-style: italic; font-display: swap; }\n\n:root {\n  /* =====================================================================\n     PRIMITIVES — raw palette. Don't use these directly in components;\n     always reach for the semantic tokens below.\n     ===================================================================== */\n\n  /* Ink — warm near-black */\n  --ink-000: #0a0a0a;\n  --ink-050: #121211;\n  --ink-100: #1a1a18;\n  --ink-200: #242421;\n  --ink-300: #2e2e2a;\n  --ink-400: #3a3a35;\n\n  /* Paper — warm off-white */\n  --paper-000: #faf8f3;\n  --paper-050: #f4f1ea;\n  --paper-100: #ebe7dd;\n  --paper-200: #ddd7c9;\n  --paper-300: #c8c1b0;\n\n  /* Bone — neutral-warm greys */\n  --bone-100: #f5f2eb;\n  --bone-300: #c8c3b8;\n  --bone-500: #8a857a;\n  --bone-700: #55524a;\n\n  /* Midnight — cool blue-black */\n  --midnight-000: #0b0f17;\n  --midnight-050: #10151f;\n  --midnight-100: #161c28;\n  --midnight-200: #1f2634;\n  --midnight-300: #2a3244;\n  --midnight-fg:  #e6ecf5;\n  --midnight-fg-muted: #a8b2c4;\n  --midnight-fg-subtle: #6c778a;\n\n  /* Mono — pure neutral (no warmth) */\n  --mono-000: #0d0d0d;\n  --mono-050: #141414;\n  --mono-100: #1c1c1c;\n  --mono-200: #262626;\n  --mono-300: #333333;\n  --mono-fg:  #f2f2f2;\n  --mono-fg-muted: #bfbfbf;\n  --mono-fg-subtle: #808080;\n\n  /* Accents — single-color highlights per scheme */\n  --accent-amber-500: #e0a566;  --accent-amber-600: #c98849;  --accent-amber-200: #f4d4a8;\n  --accent-ice-500:   #86b9d9;  --accent-ice-600:   #5f9abf;  --accent-ice-200:   #c5ddee;\n  --accent-ember-500: #c8593f;  --accent-ember-600: #a94430;  --accent-ember-200: #e8a497;\n  --accent-sage-500:  #93a878;  --accent-sage-600:  #748a5a;  --accent-sage-200:  #c7d2b5;\n  --accent-bone-500:  #d6cdb9;  --accent-bone-600:  #b8ad94;  --accent-bone-200:  #ece6d4;\n\n  /* Semantic — shared across schemes, soft + desaturated */\n  --success: #6b9e6b;\n  --danger:  #c56b5a;\n  --warning: #d4a057;\n\n  /* =====================================================================\n     TYPE — families (invariant across all themes)\n     ===================================================================== */\n  /* MASCULINE SHIFT — Satoshi Black/Bold is the voice now. Display serif\n     kept as an *accent* for italic names only. */\n  --font-display: 'Satoshi', ui-sans-serif, -apple-system, 'Helvetica Neue', Arial, sans-serif;\n  --font-accent:  'Instrument Serif', 'Times New Roman', Georgia, serif;\n  --font-sans:    'Satoshi', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n\n  /* =====================================================================\n     TYPE SCALE\n     ===================================================================== */\n  --fs-mono-xs:   11px;\n  --fs-mono-sm:   12px;\n  --fs-body-sm:   13px;\n  --fs-body:      15px;\n  --fs-body-lg:   17px;\n  --fs-display-xs: 28px;\n  --fs-display-sm: 40px;\n  --fs-display-md: 72px;\n  --fs-display-lg: 120px;\n  --fs-display-xl: 180px;\n\n  --lh-tight:   1.05;\n  --lh-snug:    1.2;\n  --lh-normal:  1.5;\n  --lh-loose:   1.7;\n\n  /* Tight negative tracking for Satoshi Black display type; wider uppercase\n     tracking for labels — the editorial/industrial voice. */\n  --tracking-tight:  -0.05em;\n  --tracking-snug:   -0.02em;\n  --tracking-normal: 0;\n  --tracking-wide:   0.12em;\n  --tracking-xwide:  0.28em;\n\n  /* SPACING — 4px base */\n  --s-0: 0; --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 20px;\n  --s-6: 24px; --s-8: 32px; --s-10: 40px; --s-12: 48px; --s-16: 64px;\n  --s-20: 80px; --s-24: 96px; --s-32: 128px; --s-40: 160px;\n\n  /* RADII — hard corners across the board. Zero. Only pills are round. */\n  --r-none: 0; --r-xs: 0;   --r-sm: 0;   --r-md: 0;   --r-full: 9999px;\n\n  /* MOTION */\n  --ease-out:    cubic-bezier(0.22, 0.61, 0.36, 1);\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n  --ease-cinema: cubic-bezier(0.16, 1, 0.3, 1);\n\n  --dur-instant: 120ms;\n  --dur-fast:    180ms;\n  --dur-normal:  300ms;\n  --dur-slow:    600ms;\n  --dur-cinema:  900ms;\n\n  /* LAYOUT */\n  --container-sm:  720px;\n  --container-md:  960px;\n  --container-lg:  1280px;\n  --container-xl:  1520px;\n  --container-2xl: 1800px;\n  --gutter: clamp(20px, 4vw, 64px);\n\n  /* =====================================================================\n     DEFAULT SEMANTIC TOKENS — equivalent to data-theme=\"noir\"\n     (near-black canvas, amber accent, warm neutrals)\n     ===================================================================== */\n  --bg:            var(--ink-000);\n  --bg-elevated:   var(--ink-050);\n  --surface:       var(--ink-100);\n  --surface-hover: var(--ink-200);\n  --border:        var(--ink-300);\n  --border-strong: var(--ink-400);\n\n  --fg:        var(--bone-100);\n  --fg-muted:  var(--bone-300);\n  --fg-subtle: var(--bone-500);\n  --fg-faint:  var(--bone-700);\n\n  /* Default accent swung masculine: ember red — harder, more alarmed. */\n  --accent:       var(--accent-ember-500);\n  --accent-hover: var(--accent-ember-600);\n  --accent-tint:  var(--accent-ember-200);\n\n  --focus-ring: rgba(200, 89, 63, 0.30);\n  --overlay:    rgba(10, 10, 10, 0.78);\n\n  --shadow-sm:   0 1px 0 rgba(0, 0, 0, 0.24);\n  --shadow-md:   0 2px 0 rgba(0, 0, 0, 0.32);\n  --shadow-lg:   0 8px 0 rgba(0, 0, 0, 0.40);\n  --shadow-ring: 0 0 0 1px var(--border);\n}\n\n/* =========================================================================\n   THEME: NOIR — default. Ink + ember red. Harder than it used to be.\n   ========================================================================= */\n[data-theme=\"noir\"] {\n  --bg:            var(--ink-000);\n  --bg-elevated:   var(--ink-050);\n  --surface:       var(--ink-100);\n  --surface-hover: var(--ink-200);\n  --border:        var(--ink-300);\n  --border-strong: var(--ink-400);\n\n  --fg:        var(--bone-100);\n  --fg-muted:  var(--bone-300);\n  --fg-subtle: var(--bone-500);\n  --fg-faint:  var(--bone-700);\n\n  --accent:       var(--accent-ember-500);\n  --accent-hover: var(--accent-ember-600);\n  --accent-tint:  var(--accent-ember-200);\n\n  --focus-ring: rgba(200, 89, 63, 0.30);\n  --overlay:    rgba(10, 10, 10, 0.78);\n}\n\n/* =========================================================================\n   THEME: PAPER — light admin / inverted public (warm off-white)\n   ========================================================================= */\n[data-theme=\"paper\"] {\n  --bg:            var(--paper-000);\n  --bg-elevated:   #ffffff;\n  --surface:       #ffffff;\n  --surface-hover: var(--paper-050);\n  --border:        var(--paper-200);\n  --border-strong: var(--paper-300);\n\n  --fg:        var(--ink-000);\n  --fg-muted:  #3a3a35;\n  --fg-subtle: #6a665c;\n  --fg-faint:  #a09a8c;\n\n  --accent:       var(--accent-ember-500);\n  --accent-hover: var(--accent-ember-600);\n  --accent-tint:  var(--accent-ember-200);\n\n  --focus-ring: rgba(200, 89, 63, 0.28);\n  --overlay:    rgba(10, 10, 10, 0.40);\n\n  --shadow-sm: 0 1px 2px rgba(20, 18, 12, 0.10), 0 1px 1px rgba(20, 18, 12, 0.06);\n  --shadow-md: 0 6px 18px rgba(20, 18, 12, 0.14), 0 2px 4px rgba(20, 18, 12, 0.08);\n  --shadow-lg: 0 24px 56px rgba(20, 18, 12, 0.22), 0 6px 14px rgba(20, 18, 12, 0.10);\n}\n\n/* =========================================================================\n   THEME: MIDNIGHT — cool blue-black, ice accent (more cinematic sci-fi)\n   ========================================================================= */\n[data-theme=\"midnight\"] {\n  --bg:            var(--midnight-000);\n  --bg-elevated:   var(--midnight-050);\n  --surface:       var(--midnight-100);\n  --surface-hover: var(--midnight-200);\n  --border:        var(--midnight-200);\n  --border-strong: var(--midnight-300);\n\n  --fg:        var(--midnight-fg);\n  --fg-muted:  var(--midnight-fg-muted);\n  --fg-subtle: var(--midnight-fg-subtle);\n  --fg-faint:  #454d5c;\n\n  --accent:       var(--accent-ice-500);\n  --accent-hover: var(--accent-ice-600);\n  --accent-tint:  var(--accent-ice-200);\n\n  --focus-ring: rgba(134, 185, 217, 0.30);\n  --overlay:    rgba(11, 15, 23, 0.75);\n}\n\n/* =========================================================================\n   THEME: BONE — editorial light, warm paper, dark ink\n   ========================================================================= */\n[data-theme=\"bone\"] {\n  --bg:            var(--paper-000);\n  --bg-elevated:   var(--paper-050);\n  --surface:       var(--paper-050);\n  --surface-hover: var(--paper-100);\n  --border:        var(--paper-200);\n  --border-strong: var(--paper-300);\n\n  --fg:        var(--ink-000);\n  --fg-muted:  var(--ink-300);\n  --fg-subtle: #6a665c;\n  --fg-faint:  #a09a8c;\n\n  --accent:       var(--accent-sage-600);\n  --accent-hover: var(--accent-sage-500);\n  --accent-tint:  var(--accent-sage-200);\n\n  --focus-ring: rgba(116, 138, 90, 0.30);\n  --overlay:    rgba(10, 10, 10, 0.40);\n\n  --shadow-sm: 0 1px 2px rgba(20, 18, 12, 0.10), 0 1px 1px rgba(20, 18, 12, 0.06);\n  --shadow-md: 0 6px 18px rgba(20, 18, 12, 0.14), 0 2px 4px rgba(20, 18, 12, 0.08);\n  --shadow-lg: 0 24px 56px rgba(20, 18, 12, 0.22), 0 6px 14px rgba(20, 18, 12, 0.10);\n}\n\n/* =========================================================================\n   THEME: EMBER — dark charcoal w/ deep red accent (most dramatic)\n   ========================================================================= */\n[data-theme=\"ember\"] {\n  --bg:            #0e0a09;\n  --bg-elevated:   #15100e;\n  --surface:       #1c1614;\n  --surface-hover: #26201d;\n  --border:        #2f2824;\n  --border-strong: #3d342f;\n\n  --fg:        #f1ebe5;\n  --fg-muted:  #c9bfb4;\n  --fg-subtle: #88807a;\n  --fg-faint:  #58524d;\n\n  --accent:       var(--accent-ember-500);\n  --accent-hover: var(--accent-ember-600);\n  --accent-tint:  var(--accent-ember-200);\n\n  --focus-ring: rgba(200, 89, 63, 0.30);\n  --overlay:    rgba(14, 10, 9, 0.78);\n}\n\n/* =========================================================================\n   THEME: MONO — pure grayscale, no warmth, maximum restraint\n   ========================================================================= */\n[data-theme=\"mono\"] {\n  --bg:            var(--mono-000);\n  --bg-elevated:   var(--mono-050);\n  --surface:       var(--mono-100);\n  --surface-hover: var(--mono-200);\n  --border:        var(--mono-200);\n  --border-strong: var(--mono-300);\n\n  --fg:        var(--mono-fg);\n  --fg-muted:  var(--mono-fg-muted);\n  --fg-subtle: var(--mono-fg-subtle);\n  --fg-faint:  #555;\n\n  --accent:       #f2f2f2;\n  --accent-hover: #ffffff;\n  --accent-tint:  #e0e0e0;\n\n  --focus-ring: rgba(242, 242, 242, 0.25);\n  --overlay:    rgba(0, 0, 0, 0.78);\n}\n\n/* =
